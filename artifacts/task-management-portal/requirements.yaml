packages:
  "recharts": "For dashboard analytics charts and data visualization"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "Zod validation resolver for react-hook-form"
  "date-fns": "For formatting assigned dates and created dates nicely"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"

images:
