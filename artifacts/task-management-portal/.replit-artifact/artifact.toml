kind = "web"
previewPath = "/"
title = "Task Management Portal"
version = "1.0.0"
id = "artifacts/task-management-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23380

[services.development]
run = "pnpm --filter @workspace/task-management-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/task-management-portal", "run", "build" ]
publicDir = "artifacts/task-management-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23380"
BASE_PATH = "/"
